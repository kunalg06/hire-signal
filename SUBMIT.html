<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📤 Submit Assignment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        p { color: #666; margin: 10px 0; line-height: 1.6; }
        .info-box { background: #f0f7ff; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #667eea; }
        .code-status { background: #f8f9fa; padding: 15px; border-radius: 6px; margin: 20px 0; font-family: monospace; font-size: 14px; }
        .code-status.ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        button { background: #667eea; color: white; border: none; padding: 15px 40px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; width: 100%; }
        button:hover { background: #5568d3; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-weight: 600; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.loading { background: #e2e3e5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Submit Assignment</h1>
        <div class="info-box">
            <p><strong>Ready to submit your solution?</strong></p>
            <p>Your code will be sent to your instructor for evaluation and feedback.</p>
        </div>
        <div class="code-status" id="codeStatus">Checking solution.py...</div>
        <p style="color: #999; font-size: 14px; margin-top: 15px;">
            ✓ solution.py will be submitted<br>
            ✓ Instructions and logs will be included
        </p>
        <button id="submitBtn" onclick="submitAssignment()" disabled>🚀 Submit Solution to Instructor</button>
        <div id="status" class="status"></div>
    </div>
    <script>
        async function checkSolution() {
            try {
                const response = await fetch('http://localhost:9999/check-solution');
                const data = await response.json();
                const statusEl = document.getElementById('codeStatus');
                if (data.exists) {
                    statusEl.className = 'code-status ready';
                    statusEl.innerHTML = '✅ solution.py ready to submit';
                    document.getElementById('submitBtn').disabled = false;
                } else {
                    statusEl.innerHTML = '⚠️ solution.py not found in /workspace/';
                }
            } catch (e) {
                console.error('Error checking solution:', e);
                document.getElementById('codeStatus').innerHTML = '❌ Cannot connect to server';
            }
        }
        async function submitAssignment() {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.className = 'status loading';
            status.textContent = '⏳ Submitting your solution...';
            status.style.display = 'block';
            try {
                const response = await fetch('http://localhost:9999/submit', {method: 'POST'});
                const data = await response.json();
                status.className = 'status success';
                status.innerHTML = `✅ Submitted successfully!<br><small>Score: ${data.score}/100</small>`;
            } catch (error) {
                status.className = 'status error';
                status.textContent = '❌ Error: ' + error.message;
                btn.disabled = false;
            }
        }
        checkSolution();
    </script>
</body>
</html>
